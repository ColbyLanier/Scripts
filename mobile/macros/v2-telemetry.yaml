# Unified App Telemetry v2
# Single macro handles all app open/close events.
# Posts raw trigger name to /phone/event — server parses app + action.
# Discord webhook fallback on server unreachable.

name: "Telemetry"
category: "Telemetry"
description: "Report app opens/closes to server via /phone/event"
enabled: true

variables:
  - name: app_name
    type: string
    value: ""
  - name: response_code
    type: integer
    value: 0

triggers:
  # --- Twitter/X ---
  - type: app_launched
    apps: ["X"]
    packages: ["com.twitter.android"]
    launched: true
  - type: app_launched
    apps: ["X"]
    packages: ["com.twitter.android"]
    launched: false

  # --- Games ---
  - type: app_launched
    apps: ["20 Minutes Till Dawn"]
    launched: true
  - type: app_launched
    apps: ["20 Minutes Till Dawn"]
    launched: false
  - type: app_launched
    apps: ["Thronefall"]
    launched: true
  - type: app_launched
    apps: ["Thronefall"]
    launched: false
  - type: app_launched
    apps: ["Frontiers"]
    launched: true
  - type: app_launched
    apps: ["Frontiers"]
    launched: false
  - type: app_launched
    apps: ["Missiles"]
    launched: true
  - type: app_launched
    apps: ["Missiles"]
    launched: false
  - type: app_launched
    apps: ["OneBit Adventure"]
    launched: true
  - type: app_launched
    apps: ["OneBit Adventure"]
    launched: false
  - type: app_launched
    apps: ["Slice & Dice"]
    launched: true
  - type: app_launched
    apps: ["Slice & Dice"]
    launched: false

  # --- Social ---
  - type: app_launched
    apps: ["Discord"]
    launched: true
  - type: app_launched
    apps: ["Discord"]
    launched: false
  - type: app_launched
    apps: ["Instagram"]
    launched: true
  - type: app_launched
    apps: ["Instagram"]
    launched: false
  - type: app_launched
    apps: ["Snapchat"]
    launched: true
  - type: app_launched
    apps: ["Snapchat"]
    launched: false
  - type: app_launched
    apps: ["Tinder"]
    launched: true
  - type: app_launched
    apps: ["Tinder"]
    launched: false
  - type: app_launched
    apps: ["Chat"]
    launched: true
  - type: app_launched
    apps: ["Chat"]
    launched: false

  # --- Productivity (tracked, not blocked) ---
  - type: app_launched
    apps: ["Gmail"]
    launched: true
  - type: app_launched
    apps: ["Gmail"]
    launched: false
  - type: app_launched
    apps: ["Keep Notes"]
    launched: true
  - type: app_launched
    apps: ["Keep Notes"]
    launched: false
  - type: app_launched
    apps: ["Obsidian"]
    launched: true
  - type: app_launched
    apps: ["Obsidian"]
    launched: false
  - type: app_launched
    apps: ["Rocket Money"]
    launched: true
  - type: app_launched
    apps: ["Rocket Money"]
    launched: false
  - type: app_launched
    apps: ["MacroDroid"]
    launched: true
  - type: app_launched
    apps: ["MacroDroid"]
    launched: false
  - type: app_launched
    apps: ["Vivaldi"]
    launched: true
  - type: app_launched
    apps: ["Vivaldi"]
    launched: false

actions:
  # 1. Log trigger
  - type: shell
    command: 'mkdir -p /storage/emulated/0/MacroDroid/logs && echo "{system_time} INFO telemetry TRIGGERED app={trigger_that_fired}" >> /storage/emulated/0/MacroDroid/logs/telemetry.log'
    block: false

  # 2. POST to server — body uses raw trigger name, server parses it
  - type: http_request
    url: "http://100.95.109.23:7777/phone/event"
    method: POST
    body: '{"app": "{trigger_that_fired}"}'
    content_type: "application/json"
    code_var: "response_code"
    block_next: true
    timeout: 5

  # 3. Log result
  - type: shell
    command: 'echo "{system_time} INFO telemetry HTTP code={lv=response_code}" >> /storage/emulated/0/MacroDroid/logs/telemetry.log'
    block: false

  # 4. If server unreachable, fallback to Discord
  - type: if
    conditions:
      - type: variable
        variable: "response_code"
        var_type: integer
        comparison: not_equals
        value: 200
        local_var: true

  - type: shell
    command: 'echo "{system_time} WARN telemetry FALLBACK code={lv=response_code}" >> /storage/emulated/0/MacroDroid/logs/telemetry.log'
    block: false

  - type: http_request
    url: "https://discord.com/api/webhooks/1481081278190063828/Z7ObPIY-V-bKUkmC9rDhxajo4IssLE2kXirbqBxAGIJDvU8PwzY2tw2C91PadL5N2rlv"
    method: POST
    body: '{"content": "FALLBACK: {trigger_that_fired} (code={lv=response_code})"}'
    content_type: "application/json"
    block_next: false
    timeout: 5

  - type: end_if
